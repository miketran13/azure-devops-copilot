name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      extension: ${{ steps.detect.outputs.extension }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: detect
        run: |
          # Get changed files since last commit (handles first-commit edge case)
          if git rev-parse HEAD~1 &>/dev/null; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          BACKEND=false
          EXTENSION=false
          echo "$CHANGED" | grep -q "^backend/" && BACKEND=true
          echo "$CHANGED" | grep -q "^extension/" && EXTENSION=true

          echo "backend=$BACKEND" >> $GITHUB_OUTPUT
          echo "extension=$EXTENSION" >> $GITHUB_OUTPUT
          echo "Summary: backend=$BACKEND extension=$EXTENSION"

          # Save as artifact so deploy workflows can read it via workflow_run
          echo "{\"backend\":$BACKEND,\"extension\":$EXTENSION}" > changed-paths.json

      - name: Upload change detection artifact
        uses: actions/upload-artifact@v4
        with:
          name: changed-paths
          path: changed-paths.json

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    # On push: only run if backend files changed. On pull_request: always run.
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/DevOpsCopilot.Functions.csproj

      - name: Build
        run: dotnet build backend/DevOpsCopilot.Functions.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Tests/DevOpsCopilot.Tests.csproj --configuration Release --verbosity normal

  extension:
    name: Extension Build & Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    # On push: only run if extension files changed. On pull_request: always run.
    if: needs.detect-changes.outputs.extension == 'true' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: extension
        run: npm run build
