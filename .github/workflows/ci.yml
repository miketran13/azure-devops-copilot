name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/DevOpsCopilot.Functions.csproj

      - name: Build
        run: dotnet build backend/DevOpsCopilot.Functions.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Tests/DevOpsCopilot.Tests.csproj --configuration Release --verbosity normal

  extension:
    name: Extension Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: extension
        run: npm run build
